<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Kivana | Personal Finance &amp; Accounting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
    <link href="/static/css/main.2a5ca006.css" rel="stylesheet" />
    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation()
            e.preventDefault()
          }
        },
        true
      )
    </script>
    <script>
      ;(function () {
        var targetUrl = "/portal/?portal=1"
        var downloadUrl = "https://github.com/kivana-software/Kivana/releases/latest"
        function normalizeText(s) {
          return String(s || "")
            .replace(/\s+/g, " ")
            .trim()
            .toLowerCase()
        }
        function getCtaTarget(el) {
          if (!el) return false
          var t = normalizeText(el.textContent)
          if (t === "sign in" || t === "try free" || t === "create account") return targetUrl
          if (t.includes("download") && (t.includes("mac") || t.includes("windows") || t.includes("win"))) return downloadUrl
          if (t === "download" || t === "download now" || t === "download app") return downloadUrl
          return ""
        }
        function wireLinks() {
          var candidates = document.querySelectorAll("button,a")
          for (var i = 0; i < candidates.length; i++) {
            var el = candidates[i]
            var dest = getCtaTarget(el)
            if (!dest) continue
            if (el.tagName === "A") {
              el.setAttribute("href", dest)
              if (dest.indexOf("https://") === 0) {
                el.setAttribute("target", "_blank")
                el.setAttribute("rel", "noopener")
              }
            }
          }
        }
        document.addEventListener(
          "click",
          function (e) {
            var el = e.target && e.target.closest ? e.target.closest("button,a") : null
            var dest = getCtaTarget(el)
            if (!dest) return
            e.preventDefault()
            e.stopPropagation()
            window.location.href = dest
          },
          true
        )
        if (document.readyState === "loading") {
          document.addEventListener("DOMContentLoaded", wireLinks)
        } else {
          wireLinks()
        }
        try {
          var obs = new MutationObserver(function () {
            wireLinks()
          })
          obs.observe(document.documentElement, { childList: true, subtree: true })
        } catch (err) {}
      })()
    </script>
    <script defer="defer" src="/static/js/main.e964d4c9.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
  </body>
</html>
