<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#000000" />
    <title>Kivana | Personal Finance &amp; Accounting</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
    <link href="/static/css/main.2a5ca006.css" rel="stylesheet" />
    <style>
      #portalQuickLinks {
        position: fixed;
        top: 16px;
        right: 16px;
        z-index: 9998;
        display: flex;
        gap: 10px;
      }
      #portalQuickLinks a {
        font-family: Inter, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
        font-weight: 700;
        font-size: 14px;
        line-height: 1;
        text-decoration: none;
        border-radius: 999px;
        padding: 12px 16px;
        display: inline-flex;
        align-items: center;
        justify-content: center;
      }
      #portalQuickLinks .portalSignIn {
        background: #fff;
        border: 2px solid #1b1748;
        color: #1b1748;
      }
      #portalQuickLinks .portalSignIn:hover {
        background: #f0eefc;
      }
      #portalQuickLinks .portalCreate {
        background: #4f3ddd;
        color: #fff;
        border: 2px solid #4f3ddd;
      }
      #portalQuickLinks .portalCreate:hover {
        background: #3f2fcb;
        border-color: #3f2fcb;
      }
    </style>
    <script>
      window.addEventListener(
        "error",
        function (e) {
          if (
            e.error instanceof DOMException &&
            e.error.name === "DataCloneError" &&
            e.message &&
            e.message.includes("PerformanceServerTiming")
          ) {
            e.stopImmediatePropagation()
            e.preventDefault()
          }
        },
        true
      )
    </script>
    <script defer="defer" src="/static/js/main.e964d4c9.js"></script>
  </head>
  <body>
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="portalQuickLinks">
      <a class="portalSignIn" href="/portal/?portal=1">Sign in</a>
      <a class="portalCreate" href="/portal/?portal=1">Create account</a>
    </div>
    <div id="root"></div>
  </body>
</html>
