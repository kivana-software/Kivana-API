<!DOCTYPE html>
<html lang="en">
  <head>
    <!--
      Account portal entry page.

      Purpose:
      - Hosts the “Account” single-page UI under `/account/` (profile, billing, security, support).
      - Loads the account JS/CSS bundle served by the backend (see `src/main.rs` routes).

      Caching:
      - `no-store` meta headers are used to avoid stale bundles during deployment.
      - An additional CSS bundle may be loaded via `/asset-manifest.json` when the marketing site build is present.
    -->
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta http-equiv="Cache-Control" content="no-store, no-cache, must-revalidate, max-age=0" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <link rel="icon" type="image/png" href="/kivana-logo.png" />
    <link rel="apple-touch-icon" href="/kivana-logo.png" />
    <title>Kivana | Account</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
    <script>
      try {
        window.tailwind = window.tailwind || {}
        window.tailwind.config = { corePlugins: { preflight: false } }
      } catch {}
    </script>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      .kp-shell {
        display: flex;
        flex-direction: column;
        gap: 32px;
      }
      .kp-aside {
        width: 100%;
      }
      .kp-main {
        flex: 1;
        min-width: 0;
      }
      @media (min-width: 1024px) {
        .kp-shell {
          flex-direction: row;
          align-items: flex-start;
        }
        .kp-aside {
          width: 260px;
          flex: 0 0 260px;
          position: sticky;
          top: 92px;
        }
      }
      .kp-grid {
        display: grid;
        gap: 16px;
      }
      .kp-user-stats {
        grid-template-columns: 1fr;
      }
      @media (min-width: 768px) {
        .kp-user-stats {
          grid-template-columns: repeat(3, minmax(0, 1fr));
        }
      }
      .kp-admin-stats {
        grid-template-columns: 1fr;
      }
      @media (min-width: 640px) {
        .kp-admin-stats {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (min-width: 1024px) {
        .kp-admin-stats {
          grid-template-columns: repeat(4, minmax(0, 1fr));
        }
      }
      .kp-plan-grid {
        grid-template-columns: 1fr;
      }
      @media (min-width: 640px) {
        .kp-plan-grid {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      @media (min-width: 1024px) {
        .kp-plan-grid {
          grid-template-columns: repeat(5, minmax(0, 1fr));
        }
      }
      .kp-two-col {
        grid-template-columns: 1fr;
      }
      @media (min-width: 1024px) {
        .kp-two-col {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
    </style>
    <script>
      ;(() => {
        fetch('/asset-manifest.json', { cache: 'no-store' })
          .then((r) => (r.ok ? r.json() : Promise.reject(new Error('manifest'))))
          .then((m) => {
            const files = (m && m.files) || {}
            const cssHref = files['main.css']
            if (!cssHref) return
            const link = document.createElement('link')
            link.rel = 'stylesheet'
            link.href = cssHref
            document.head.appendChild(link)
          })
          .catch(() => {})
      })()
    </script>
    <link rel="stylesheet" href="/account/app.v0.3.10.css" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/account/app.v0.3.10.js"></script>
  </body>
</html>
