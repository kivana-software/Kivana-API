<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="icon" type="image/png" href="/kivana-logo.png" />
    <link rel="apple-touch-icon" href="/kivana-logo.png" />
    <title>Kivana | Account</title>
    <meta name="robots" content="noindex,nofollow" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Lora:ital,wght@0,500;0,600;0,700;1,500&display=swap" rel="stylesheet" />
    <script>
      ;(() => {
        fetch('/asset-manifest.json', { cache: 'no-store' })
          .then((r) => (r.ok ? r.json() : Promise.reject(new Error('manifest'))))
          .then((m) => {
            const files = (m && m.files) || {}
            const cssHref = files['main.css']
            if (!cssHref) return
            const link = document.createElement('link')
            link.rel = 'stylesheet'
            link.href = cssHref
            document.head.appendChild(link)
          })
          .catch(() => {})
      })()
    </script>
    <link rel="stylesheet" href="/account/app.css?v=0.1.0" />
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/account/app.js?v=0.1.0"></script>
  </body>
</html>
