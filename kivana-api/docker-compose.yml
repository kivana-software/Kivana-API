services:
  db:
    image: postgres:16
    environment:
      POSTGRES_DB: kivana
      POSTGRES_USER: kivana
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-kivana_password}
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U kivana -d kivana"]
      interval: 5s
      timeout: 3s
      retries: 20
    restart: unless-stopped

  api:
    build:
      context: .
      dockerfile: Dockerfile
    env_file:
      - .env
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "${KIVANA_BIND_IP:-0.0.0.0}:${KIVANA_HTTP_PORT:-8080}:8080"
    restart: unless-stopped

volumes:
  db_data:
