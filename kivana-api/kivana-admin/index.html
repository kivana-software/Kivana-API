<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Kivana Admin</title>
    <link rel="icon" type="image/png" href="/kivana-logo.png" />
    <link rel="stylesheet" href="./admin.css" />
  </head>
  <body>
    <div class="shell">
      <header class="top">
        <div class="brand">Kivana Admin</div>
        <div class="right">
          <div id="me" class="me"></div>
          <button id="refresh" class="btn">Refresh</button>
          <button id="logout" class="btn">Sign out</button>
        </div>
      </header>

      <main class="main">
        <section id="authCard" class="card">
          <div class="cardTitle">Sign in</div>
          <div class="row">
            <label class="label">Backend URL</label>
            <input id="baseUrl" class="input" value="" />
          </div>
          <div class="row">
            <label class="label">Email</label>
            <input id="email" class="input" value="" />
          </div>
          <div class="row">
            <label class="label">Password</label>
            <input id="password" class="input" type="password" value="" />
          </div>
          <div class="row">
            <label class="label">Human check</label>
            <div class="input">
              <div id="captchaQuestion" style="margin-bottom: 8px; opacity: 0.9">Loading…</div>
              <input id="captchaAnswer" class="input" value="" placeholder="Answer" />
            </div>
          </div>
          <div class="actions">
            <button id="login" class="btn primary">Sign in</button>
          </div>
          <div id="authStatus" class="status"></div>
        </section>

        <section id="panel" class="card" style="display: none">
          <div class="cardTitle">Users</div>
          <div id="panelStatus" class="status"></div>
          <div class="tableWrap">
            <table class="table">
              <thead>
                <tr>
                  <th>Email</th>
                  <th>Created</th>
                  <th>IP Address</th>
                  <th>Admin</th>
                  <th>Kivana Plan</th>
                  <th>Ends At</th>
                  <th>Set Plan</th>
                  <th>Duration</th>
                  <th>Actions</th>
                </tr>
              </thead>
              <tbody id="usersBody"></tbody>
            </table>
          </div>
        </section>

        <section id="bootstrapCard" class="card">
          <div class="cardTitle">Bootstrap Admin</div>
          <div class="note">
            Use this once to mark your account as admin. Requires the server ADMIN_TOKEN (x-admin-token header).
          </div>
          <div class="row">
            <label class="label">Email</label>
            <input id="bootstrapEmail" class="input" value="" />
          </div>
          <div class="row">
            <label class="label">Admin Token</label>
            <input id="bootstrapToken" class="input" type="password" value="" />
          </div>
          <div class="actions">
            <button id="bootstrapBtn" class="btn">Make Admin</button>
          </div>
          <div id="bootstrapStatus" class="status"></div>
        </section>
      </main>
    </div>

    <div class="modal hidden" id="actionModal" role="dialog" aria-modal="true" aria-label="Action">
      <div class="modalPanel">
        <div class="modalTop">
          <div class="modalTitle" id="actionModalTitle">Action</div>
          <button class="modalClose btn" id="btnCloseActionModal" type="button" aria-label="Close">Close</button>
        </div>
        <div class="modalBody">
          <div id="actionModalBody"></div>
          <div class="modalActions">
            <button class="btn" id="actionModalCancel" type="button">Cancel</button>
            <button class="btn primary" id="actionModalOk" type="button">OK</button>
          </div>
        </div>
      </div>
      <div class="modalBackdrop" id="actionModalBackdrop"></div>
    </div>

    <script src="./admin.js" type="module"></script>
  </body>
</html>
